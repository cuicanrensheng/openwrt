name: 为MiWiFi R4AC编译OpenWrt

于:
工作流_dispatch:
输入:
修订版:
描述: '固件版本'
必填: 是
默认: '24.10'

作业:
构建-openwrt:
运行于: ubuntu-latest
步骤:
      - 名称: 检出源码
使用: actions/checkout@v4
使用:
          fetch-depth: 0

      - 名称: 拉取OpenWrt官方源码（24.10稳定版）
运行: |
          # 拉取官方源码
git 克隆 https://github.com/openwrt/openwrt.git
          cd openwrt
         
          
# 将你的自定义.config复制到源码目录
          cp ../.config .config

      - name: 安装编译依赖 (官方标准脚本，避开系统坑)
运行: |
          cd openwrt
# 关键：使用 OpenWrt 官方脚本安装专属依赖，替代 apt-get
          sudo ./scripts/ext-depends.sh
          # 修复缺失的 Python 工具，强制安装 setuptools
          sudo apt-get update -y
          sudo apt-get install -y python3-setuptools python3-distutils

- 名称：更新与安装 Feeds
运行: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 预下载依赖包
运行: |
          cd openwrt
          make -j$(nproc) defconfig
          make -j$(nproc) download

      - name: 开始编译固件
运行: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MiWiFi-R4AC
          path: openwrt/bin/targets/ramips/mt7620a/*-miwifi_r4ac-*-squashfs-sysupgrade.bin
          retention-days: 30
