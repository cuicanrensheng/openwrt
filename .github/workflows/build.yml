name: Build OpenWrt for MiWiFi R4AC (24.10 稳定版)

on:
  workflow_dispatch:
    inputs:
      REVISION:
        description: '固件版本号'
        required: true
        default: '24.10'

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装系统依赖 (官方标准方法)
        run: |
          # 🔥 关键：使用 Ubuntu 官方命令安装 OpenWrt 编译必须依赖
          sudo apt-get update -y
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk gettext git-core libssl-dev xsltproc unzip

      - name: 拉取 OpenWrt 官方源码 (24.10稳定版)
        run: |
          git clone --branch=openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 复制你的自定义.config 到源码目录
          cp ../.config .config

      - name: 更新与安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 预下载所有依赖包
        run: |
          cd openwrt
          make -j$(nproc) defconfig
          make -j$(nproc) download

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MiWiFi-R4AC-24.10
          path: openwrt/bin/targets/ramips/mt7620a/*-miwifi_r4ac-*-squashfs-sysupgrade.bin
          retention-days: 30
