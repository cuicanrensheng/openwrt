name: Build OpenWrt for MiWiFi R4AC

on:
  workflow_dispatch:
    inputs:
      REVISION:
        description: 'Firmware Version'
        required: true
        default: '24.10'

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取 OpenWrt 官方源码 (24.10 稳定版)
        run: |
          # 拉取官方源码
          git clone https://github.com/openwrt/openwrt.git     
          cd openwrt
          git checkout openwrt-24.10 
          
          # 复制你的自定义.config 到源码目录
          cp ../.config .config

      - name: 安装编译依赖 (官方标准脚本，避开系统坑)
        run: |
          cd openwrt
          # 🔥 关键：使用 OpenWrt 官方脚本安装专属依赖，替代 apt-get
          sudo ./scripts/ext-depends.sh
          # 修复缺失的 Python 工具，强制安装 setuptools
          sudo apt-get update -y
          sudo apt-get install -y python3-setuptools python3-distutils

      - name: 更新 & 安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 预下载依赖包
        run: |
          cd openwrt
          make -j$(nproc) defconfig
          make -j$(nproc) download

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MiWiFi-R4AC
          path: openwrt/bin/targets/ramips/mt7620a/*-miwifi_r4ac-*-squashfs-sysupgrade.bin
          retention-days: 30
