name: Build OpenWrt for MiWiFi R4AC

on:
  workflow_dispatch:
    inputs:
      REVISION:
        description: '固件版本号'
        required: true
        default: '24.10'

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取OpenWrt官方源码 (24.10稳定版)
        run: |
          # 拉取官方源码
          git clone --branch=openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 将你的自定义.config复制到源码目录
          cp ../.config .config

      - name: 安装编译依赖 (官方标准脚本)
        run: |
          cd openwrt
          # 关键: 使用OpenWrt官方脚本安装专属依赖
          sudo ./scripts/ext-depends.sh
          # 修复Python工具
          sudo apt-get update -y
          sudo apt-get install -y python3-setuptools

      - name: 更新与安装Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 预下载所有依赖包
        run: |
          cd openwrt
          make -j$(nproc) defconfig
          make -j$(nproc) download

      - name: 开始编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传编译好的固件
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-MiWiFi-R4AC
          path: openwrt/bin/targets/ramips/mt7620a/*-miwifi_r4ac-*-squashfs-sysupgrade.bin
          retention-days: 30
